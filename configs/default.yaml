node_id: argus-edge-01
cameras:
- camera_id: c
  name: c
  source: rtsp://127.0.0.1:8554/c
  protocol: rtsp
  fps_target: 15
  resolution:
  - 640
  - 480
  zones: []
  reconnect_delay: 5.0
  max_reconnect_attempts: -1
  watchdog_timeout: 30.0
  mog2:
    history: 500
    var_threshold: 25.0
    detect_shadows: true
    change_pct_threshold: 0.005
    denoise: true
    enable_stabilization: true
    heartbeat_frames: 150
    lock_score_threshold: 0.85
    lock_clear_frames: 10
  person_filter:
    confidence: 0.4
    skip_frame_on_person: false
    model_name: yolo11n.pt
    classes_to_detect:
    - 0
    enable_tracking: false
  anomaly:
    model_type: patchcore
    threshold: 0.7
    image_size:
    - 256
    - 256
    enable_multiscale: false
    tile_size: 512
    tile_overlap: 0.25
    dinomaly_backbone: dinov2_vitb14
    dinomaly_encoder_layers:
    - 2
    - 5
    - 8
    - 11
    dinomaly_few_shot_images: 8
    dinomaly_multi_class: false
    quantization: fp16
    quantization_calibration_images: 100
    enable_calibration: true
    ssim_baseline_frames: 15
    ssim_sensitivity: 50.0
    ssim_midpoint: 0.015
    shadow_sample_rate: 5
    warmup_frames: 10
    warmup_max_latency_ms: 500.0
    verify_model_signature: false
    min_shadow_days: 3
    min_canary_days: 7
    backbone_max_per_camera: 5000
    backbone_max_total_images: 50000
  simplex:
    enabled: true
    diff_threshold: 30
    min_area_px: 500
    min_static_seconds: 30.0
    morph_kernel_size: 5
    match_radius_px: 50
  health:
    enabled: true
    freeze_detection: true
    lens_contamination_detection: true
    displacement_detection: true
    flash_suppression: true
    gain_drift_detection: true
    freeze_window_frames: 10
    sharpness_drop_pct: 0.3
    displacement_threshold_px: 20.0
    flash_sigma: 3.0
    gain_drift_threshold_pct: 20.0
  drift:
    enabled: true
    reference_window: 500
    test_window: 100
    p_value_threshold: 0.01
    ks_threshold: 0.1
    cooldown_minutes: 30
  degradation:
    max_consecutive_failures: 5
    refuse_start_on_backbone_failure: false
    watchdog_check_interval_seconds: 15.0
  ring_buffer:
    enabled: true
    pre_trigger_seconds: 60
    post_trigger_seconds: 30
    jpeg_quality: 85
    video_crf: 23
    video_preset: veryfast
    max_recording_age_days: 30
    archive_dir: data/recordings
  low_light:
    enabled: true
    brightness_threshold: 40.0
alerts:
  severity_thresholds:
    info: 0.5
    low: 0.7
    medium: 0.85
    high: 0.95
  temporal:
    min_consecutive_frames: 3
    max_gap_seconds: 10.0
    min_spatial_overlap: 0.3
    evidence_lambda: 0.95
    evidence_threshold: 3.0
  suppression:
    same_zone_window_seconds: 300.0
    same_camera_window_seconds: 60.0
  calibration:
    enabled: false
    target_fpr_info: 0.1
    target_fpr_low: 0.01
    target_fpr_medium: 0.001
    target_fpr_high: 0.0001
    min_calibration_samples: 50
  zone_multipliers:
    critical: 1.2
    standard: 1.0
    low_priority: 0.8
  webhook:
    enabled: false
    url: ''
    timeout: 5.0
  circuit_breaker_threshold: 5
  circuit_breaker_timeout: 60.0
auth:
  enabled: false
  api_token: ''
  session_timeout_minutes: 480
dashboard:
  host: 0.0.0.0
  port: 8080
  debug: false
  mjpeg_fps: 5.0
  websocket_heartbeat_seconds: 30
  websocket_max_connections: 100
  audio_alerts:
    low:
      enabled: false
      sound: beep_single
      voice_template: ''
    medium:
      enabled: true
      sound: beep_single
      voice_template: ''
    high:
      enabled: true
      sound: beep_double_voice
      voice_template: '{camera} 高级别告警'
  go2rtc_enabled: true
  go2rtc_api_port: 1984
  go2rtc_rtsp_port: 8554
  go2rtc_binary: null
storage:
  database_url: sqlite:///data/db/argus.db
  baselines_dir: data\baselines
  models_dir: data\models
  exports_dir: data\exports
  backbones_dir: data\backbones
  foe_objects_dir: data\foe_objects
  model_packages_dir: data\model_packages
  alerts_dir: data\alerts
  inference_records_dir: data\inference_records
  alert_retention_days: 90
models:
  yolo_path: yolo11n.pt
  anomalib_model_dir: data\models
  anomalib_export_dir: data\exports
logging:
  log_dir: data\logs
  max_file_size_mb: 50
  backup_count: 10
  log_format: json
capture_quality:
  enabled: true
  blur_threshold: 100.0
  blur_adaptive_pct: 0.3
  brightness_min: 30.0
  brightness_max: 225.0
  brightness_std_min: 10.0
  saturated_pixel_max_pct: 0.3
  ssim_dedup_threshold: 0.98
  ssim_resize: 256
  person_confidence: 0.3
  entropy_min: 3.0
classifier:
  enabled: false
  model_name: yolov8s-worldv2.pt
  vocabulary:
  - wrench
  - bolt
  - nut
  - screwdriver
  - hammer
  - rag
  - glove
  - plastic bag
  - tape
  - wire
  - insulation
  - debris
  - paint chip
  - insect
  - bird
  - shadow
  - reflection
  min_anomaly_score_to_classify: 0.5
  high_risk_labels:
  - wrench
  - bolt
  - nut
  - screwdriver
  - hammer
  low_risk_labels:
  - insect
  - shadow
  - reflection
segmenter:
  enabled: false
  model_size: small
  max_points: 5
  min_anomaly_score: 0.7
  min_mask_area_px: 100
  timeout_seconds: 10.0
cross_camera:
  enabled: false
  overlap_pairs: []
  corroboration_threshold: 0.3
  max_age_seconds: 5.0
  uncorroborated_severity_downgrade: 1
retraining:
  enabled: false
  interval_hours: 24
  min_new_baselines: 20
  auto_deploy: false
  auto_deploy_min_grade: B
  backbone_retrain_interval_days: 30
  backbone_type: dinov2_vitb14
  validation_auroc_threshold: 0.99
  validation_recall_threshold: 0.95
  historical_replay_days: 30
  require_human_confirmation: true
  confirmation_timeout_hours: 72
feedback:
  auto_baseline_on_fp: true
  auto_validation_on_confirmed: true
  uncertain_escalation_role: supervisor
  passive_feedback_enabled: true
  validation_dir: data\validation
baseline_capture:
  default_strategy: active
  diversity_threshold: 0.3
  dino_backbone: dinov2_vits14
  dino_image_size: 224
  active_sleep_min_seconds: 1.0
  active_cpu_threads: 1
  schedule_periods:
    dawn:
    - 5
    - 8
    noon:
    - 11
    - 13
    dusk:
    - 16
    - 19
    night:
    - 22
    - 2
  frames_per_period: 50
  pause_on_anomaly_lock: true
  post_capture_review: true
  review_flag_percentile: 0.99
camera_groups: []
log_level: INFO
